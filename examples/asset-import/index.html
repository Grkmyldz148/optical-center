<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>optical-center · asset import example</title>
    <style>
      body {
        font: 16px/1.5 system-ui, sans-serif;
        max-width: 720px;
        margin: 40px auto;
        padding: 0 24px;
      }
      .row { display: flex; align-items: center; gap: 24px; margin: 16px 0; }
      .badge {
        width: 80px; height: 80px;
        background: #111; border-radius: 50%;
        display: grid; place-items: center;
      }
      .badge svg { width: 32px; height: 32px; fill: #fff; }
      h1 { letter-spacing: -0.02em; }
      code { background: #f3f3f3; padding: 2px 6px; border-radius: 4px; }
    </style>
  </head>
  <body>
    <h1>optical-center · asset import</h1>
    <p>
      Each row imports the same SVG twice — once raw, once with the
      <code>?optical</code> suffix that triggers build-time rewriting.
    </p>
    <div id="root"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
