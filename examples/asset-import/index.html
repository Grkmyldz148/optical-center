<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>optical-center · asset import (?optical)</title>
    <style>
      * { box-sizing: border-box; }
      body {
        font: 16px/1.5 system-ui, sans-serif;
        max-width: 880px;
        margin: 40px auto;
        padding: 0 24px;
        color: #111;
      }
      h1 { letter-spacing: -0.02em; }
      .lede { color: #666; margin-bottom: 32px; }
      .row {
        display: grid;
        grid-template-columns: 80px 80px 1fr;
        gap: 16px;
        align-items: center;
        margin-bottom: 16px;
      }
      .badge {
        width: 80px; height: 80px;
        background: #111;
        border-radius: 50%;
        display: grid; place-items: center;
      }
      .badge svg { width: 36px; height: 36px; color: #fff; }
      code {
        font-family: ui-monospace, monospace;
        font-size: 13px;
        color: #555;
      }
    </style>
  </head>
  <body>
    <h1>optical-center · asset import</h1>
    <p class="lede">
      Every icon in <code>fixtures/icons/</code> imported twice — once
      raw, once with <code>?optical</code>. The right column is
      rewritten by the Vite plugin at build time. Pulled via
      <code>import.meta.glob</code> so the example scales with the
      shared pool.
    </p>
    <div id="root"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
