<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>optical-center · react-vite example</title>
    <style>
      :root { color-scheme: light dark; }
      body {
        font: 16px/1.5 system-ui, sans-serif;
        max-width: 720px;
        margin: 40px auto;
        padding: 0 24px;
        color: #111;
      }
      .grid { display: grid; gap: 32px; }
      .pair {
        display: grid;
        grid-template-columns: 100px 100px 1fr;
        gap: 16px;
        align-items: center;
      }
      .badge {
        position: relative;
        width: 100px; height: 100px;
        background: #111; color: #fff;
        border-radius: 50%;
        display: grid; place-items: center;
      }
      .badge svg { width: 40px; height: 40px; fill: #fff; }
      .label {
        position: absolute;
        bottom: -22px;
        font-size: 12px;
        color: #666;
        letter-spacing: 0.04em;
      }
      .name { font-family: ui-monospace, monospace; }
      code { background: #f3f3f3; padding: 2px 6px; border-radius: 4px; font-size: 90%; }
      h1 { letter-spacing: -0.02em; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
