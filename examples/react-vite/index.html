<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>optical-center · react-vite example</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #fafafa;
        --fg: #111;
        --muted: #666;
        --line: #e5e5e5;
        --brand: #111;
      }
      * { box-sizing: border-box; }
      body {
        font: 16px/1.5 system-ui, -apple-system, sans-serif;
        max-width: 880px;
        margin: 40px auto;
        padding: 0 24px;
        color: var(--fg);
        background: var(--bg);
      }
      h1 { letter-spacing: -0.02em; margin: 0 0 12px; }
      h2 { letter-spacing: -0.015em; margin: 0; font-size: 1.25rem; }
      .lede { color: var(--muted); margin-bottom: 32px; }

      section {
        border-top: 1px solid var(--line);
        padding-top: 28px;
        margin-top: 28px;
      }
      section header {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 4px;
      }
      section > p {
        color: var(--muted);
        margin: 0 0 20px;
      }

      .pill {
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        padding: 2px 8px;
        border-radius: 999px;
      }
      .pill-build-time { background: #e0e7ff; color: #3730a3; }
      .pill-runtime    { background: #fef3c7; color: #92400e; }

      .grid { display: grid; gap: 16px; }
      .row {
        display: grid;
        grid-template-columns: 80px 80px 1fr;
        gap: 16px;
        align-items: center;
      }
      .badge {
        width: 80px; height: 80px;
        background: var(--brand); color: #fff;
        border-radius: 50%;
        display: grid; place-items: center;
      }
      .badge svg { width: 36px; height: 36px; fill: currentColor; }
      .row-label {
        font: 13px ui-monospace, monospace;
        color: var(--muted);
      }
      code {
        background: #fff;
        border: 1px solid var(--line);
        padding: 1px 6px;
        border-radius: 4px;
        font-size: 90%;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
