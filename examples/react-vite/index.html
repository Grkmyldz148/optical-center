<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>optical-center · react-vite example</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #fafafa;
        --fg: #111;
        --muted: #666;
        --line: #e5e5e5;
        --brand: #111;
      }
      * { box-sizing: border-box; }
      body {
        font: 16px/1.5 system-ui, -apple-system, sans-serif;
        max-width: 880px;
        margin: 40px auto;
        padding: 0 24px;
        color: var(--fg);
        background: var(--bg);
      }
      h1 { letter-spacing: -0.02em; margin: 0 0 12px; }
      h2 { letter-spacing: -0.015em; margin: 0; font-size: 1.25rem; }
      .lede { color: var(--muted); margin-bottom: 32px; }

      section {
        border-top: 1px solid var(--line);
        padding-top: 28px;
        margin-top: 28px;
      }
      section header {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 4px;
      }
      section > p {
        color: var(--muted);
        margin: 0 0 20px;
      }

      .pill {
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        padding: 2px 8px;
        border-radius: 999px;
      }
      .pill-build-time { background: #e0e7ff; color: #3730a3; }

      h3 {
        margin: 20px 0 8px;
        font-size: 0.78rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--muted);
      }
      .badge .icon, .badge .bg-icon { color: #fff; }

      .grid { display: grid; gap: 16px; }
      .row {
        display: grid;
        grid-template-columns: 80px 80px 1fr;
        gap: 16px;
        align-items: center;
      }
      .badge {
        width: 80px; height: 80px;
        background: var(--brand); color: #fff;
        border-radius: 50%;
        display: grid; place-items: center;
        position: relative;
      }
      /*
       * Crosshair through the badge center. Lets you eyeball whether
       * an icon's perceptual mass actually sits on the geometric
       * center of its container — without it, "centered" is hard to
       * judge at a glance.
       */
      .badge::before, .badge::after {
        content: '';
        position: absolute;
        background: rgba(255, 255, 255, 0.18);
        pointer-events: none;
      }
      .badge::before {
        left: 0; right: 0; top: 50%;
        height: 1px;
      }
      .badge::after {
        top: 0; bottom: 0; left: 50%;
        width: 1px;
      }
      .badge svg, .badge .icon, .badge .bg-icon { position: relative; z-index: 1; }
      .badge svg { width: 36px; height: 36px; fill: currentColor; }
      .row-label {
        font: 13px ui-monospace, monospace;
        color: var(--muted);
      }
      .col-head {
        display: grid;
        grid-template-columns: 80px 80px 1fr;
        gap: 16px;
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--muted);
        margin-bottom: 8px;
      }
      .col-head span { text-align: center; }
      .col-head span:last-child { text-align: left; }
      pre.recipe {
        background: #0f172a;
        color: #e2e8f0;
        padding: 16px 20px;
        border-radius: 8px;
        font: 12.5px/1.55 ui-monospace, monospace;
        overflow-x: auto;
        margin: 0 0 24px;
      }
      pre.recipe .k { color: #c084fc; }
      pre.recipe .s { color: #fde68a; }
      pre.recipe .c { color: #94a3b8; font-style: italic; }
      pre.recipe .h { color: #67e8f9; }
      code {
        background: #fff;
        border: 1px solid var(--line);
        padding: 1px 6px;
        border-radius: 4px;
        font-size: 90%;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
